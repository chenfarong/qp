<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 在线测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            opacity: 0.9;
        }

        .status.connected {
            color: #4caf50;
        }

        .status.disconnected {
            color: #f44336;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .section h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-info {
            background: #2196f3;
            color: white;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 14px;
        }

        .message-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: white;
        }

        .message {
            margin: 5px 0;
            padding: 8px;
            border-radius: 3px;
            font-size: 13px;
            word-break: break-all;
        }

        .message.incoming {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }

        .message.outgoing {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }

        .message.system {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
        }

        .message.error {
            background: #ffebee;
            border-left: 3px solid #f44336;
        }

        .message .time {
            color: #666;
            font-size: 11px;
            margin-right: 5px;
        }

        .message .type {
            font-weight: bold;
            margin-right: 5px;
        }

        .message .content {
            color: #333;
        }

        .message .json-content {
            background: #f5f5f5;
            padding: 5px;
            margin-top: 5px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .auto-send {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .auto-send input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .auto-send label {
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat .label {
            color: #666;
        }

        .stat .value {
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WebSocket 在线测试工具</h1>
            <div class="status" id="status">状态: 尚未连接</div>
        </div>

        <div class="content">
            <div class="section">
                <h3>服务器配置</h3>
                <div class="input-group">
                    <input type="text" id="serverUrl" value="ws://localhost:8080/ws" placeholder="WebSocket 服务器地址">
                    <button class="btn-primary" onclick="connect()">连接</button>
                    <button class="btn-danger" onclick="disconnect()">断开</button>
                </div>
                <div class="checkbox-group" style="margin-top: 10px;">
                    <input type="checkbox" id="autoPing" checked>
                    <label for="autoPing">自动发送 Ping (30秒)</label>
                </div>
            </div>

            <div class="section">
                <h3>发包设置</h3>
                <textarea id="messageInput" placeholder="输入要发送的消息内容（支持 JSON 格式）"></textarea>
                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn-success" onclick="sendMessage()">发送消息</button>
                    <button class="btn-warning" onclick="clearInput()">清空输入</button>
                </div>
                <div class="auto-send">
                    <label>每隔</label>
                    <input type="number" id="interval" value="5" min="1" max="60">
                    <label>秒发送内容</label>
                    <button class="btn-info" onclick="toggleAutoSend()" id="autoSendBtn">开始自动发送</button>
                    <div class="checkbox-group">
                        <input type="checkbox" id="clearAfterSend">
                        <label for="clearAfterSend">发包清空输入</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>调试消息</h3>
                <div class="message-container" id="messageContainer"></div>
                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn-warning" onclick="clearMessages()">清空消息</button>
                    <div class="checkbox-group">
                        <input type="checkbox" id="jsonDecode" checked>
                        <label for="jsonDecode">收包JSON解码</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="pauseReceive">
                        <label for="pauseReceive">暂停接收</label>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="label">发送:</span>
                        <span class="value" id="sentCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">接收:</span>
                        <span class="value" id="receivedCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">错误:</span>
                        <span class="value" id="errorCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let autoSendInterval = null;
        let pingInterval = null;
        let sentCount = 0;
        let receivedCount = 0;
        let errorCount = 0;

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            if (!serverUrl) {
                addMessage('system', '请输入服务器地址');
                return;
            }

            try {
                ws = new WebSocket(serverUrl);
                updateStatus('connecting', '连接中...');

                ws.onopen = function() {
                    updateStatus('connected', '已连接');
                    addMessage('system', 'WebSocket 连接成功');
                    startPing();
                };

                ws.onmessage = function(event) {
                    if (document.getElementById('pauseReceive').checked) {
                        return;
                    }

                    receivedCount++;
                    updateStats();

                    const data = event.data;
                    const jsonDecode = document.getElementById('jsonDecode').checked;

                    if (jsonDecode) {
                        try {
                            const jsonData = JSON.parse(data);
                            addMessage('incoming', '收到消息', data, JSON.stringify(jsonData, null, 2));
                        } catch (e) {
                            addMessage('incoming', '收到消息', data);
                        }
                    } else {
                        addMessage('incoming', '收到消息', data);
                    }
                };

                ws.onclose = function() {
                    updateStatus('disconnected', '已断开');
                    addMessage('system', 'WebSocket 连接已关闭');
                    stopAutoSend();
                };

                ws.onerror = function(error) {
                    updateStatus('error', '连接错误');
                    addMessage('error', 'WebSocket 错误: ' + error);
                    errorCount++;
                    updateStats();
                };
            } catch (error) {
                updateStatus('error', '连接失败');
                addMessage('error', '连接失败: ' + error.message);
                errorCount++;
                updateStats();
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            stopAutoSend();
            stopPing();
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('error', 'WebSocket 未连接');
                errorCount++;
                updateStats();
                return;
            }

            const message = document.getElementById('messageInput').value;
            if (!message) {
                addMessage('error', '请输入消息内容');
                errorCount++;
                updateStats();
                return;
            }

            try {
                ws.send(message);
                sentCount++;
                updateStats();

                const jsonDecode = document.getElementById('jsonDecode').checked;
                if (jsonDecode) {
                    try {
                        const jsonData = JSON.parse(message);
                        addMessage('outgoing', '发送消息', message, JSON.stringify(jsonData, null, 2));
                    } catch (e) {
                        addMessage('outgoing', '发送消息', message);
                    }
                } else {
                    addMessage('outgoing', '发送消息', message);
                }

                if (document.getElementById('clearAfterSend').checked) {
                    clearInput();
                }
            } catch (error) {
                addMessage('error', '发送失败: ' + error.message);
                errorCount++;
                updateStats();
            }
        }

        function toggleAutoSend() {
            if (autoSendInterval) {
                stopAutoSend();
            } else {
                startAutoSend();
            }
        }

        function startAutoSend() {
            const interval = parseInt(document.getElementById('interval').value);
            if (isNaN(interval) || interval < 1) {
                addMessage('error', '请输入有效的间隔时间');
                return;
            }

            const message = document.getElementById('messageInput').value;
            if (!message) {
                addMessage('error', '请输入要发送的消息内容');
                return;
            }

            autoSendInterval = setInterval(function() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    sendMessage();
                } else {
                    stopAutoSend();
                    addMessage('error', 'WebSocket 未连接，停止自动发送');
                }
            }, interval * 1000);

            document.getElementById('autoSendBtn').textContent = '停止自动发送';
            document.getElementById('autoSendBtn').classList.remove('btn-info');
            document.getElementById('autoSendBtn').classList.add('btn-danger');
            addMessage('system', '开始自动发送，间隔 ' + interval + ' 秒');
        }

        function stopAutoSend() {
            if (autoSendInterval) {
                clearInterval(autoSendInterval);
                autoSendInterval = null;
                document.getElementById('autoSendBtn').textContent = '开始自动发送';
                document.getElementById('autoSendBtn').classList.remove('btn-danger');
                document.getElementById('autoSendBtn').classList.add('btn-info');
                addMessage('system', '停止自动发送');
            }
        }

        function startPing() {
            if (document.getElementById('autoPing').checked) {
                stopPing(); // 先停止之前的 ping 定时器
                pingInterval = setInterval(function() {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const pingMsg = JSON.stringify({ type: 'ping' });
                        try {
                            ws.send(pingMsg);
                            addMessage('outgoing', '发送 Ping', pingMsg);
                        } catch (error) {
                            addMessage('error', '发送 Ping 失败: ' + error.message);
                            errorCount++;
                            updateStats();
                        }
                    } else {
                        stopPing();
                    }
                }, 30000); // 30秒发送一次 ping
                addMessage('system', '开始自动发送 Ping (30秒)');
            }
        }

        function stopPing() {
            if (pingInterval) {
                clearInterval(pingInterval);
                pingInterval = null;
                addMessage('system', '停止自动发送 Ping');
            }
        }

        function clearInput() {
            document.getElementById('messageInput').value = '';
        }

        function clearMessages() {
            document.getElementById('messageContainer').innerHTML = '';
        }

        function addMessage(type, title, content, jsonContent = null) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;

            const time = new Date().toLocaleTimeString();
            let html = '<span class="time">' + time + '</span>';
            html += '<span class="type">' + title + ':</span>';
            html += '<span class="content">' + content + '</span>';

            if (jsonContent) {
                html += '<div class="json-content">' + jsonContent + '</div>';
            }

            messageDiv.innerHTML = html;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(status, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '状态: ' + message;
            statusDiv.className = 'status ' + status;
        }

        function updateStats() {
            document.getElementById('sentCount').textContent = sentCount;
            document.getElementById('receivedCount').textContent = receivedCount;
            document.getElementById('errorCount').textContent = errorCount;
        }

        // 监听 autoPing 复选框的状态变化
        document.getElementById('autoPing').addEventListener('change', function() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                if (this.checked) {
                    startPing();
                } else {
                    stopPing();
                }
            }
        });

        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
            stopAutoSend();
            stopPing();
        });
    </script>
</body>
</html>
