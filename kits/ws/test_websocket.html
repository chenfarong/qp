<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 在线测试工具</title>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.5/dist/protobuf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            opacity: 0.9;
        }

        .status.connected {
            color: #4caf50;
        }

        .status.disconnected {
            color: #f44336;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .section h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-info {
            background: #2196f3;
            color: white;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 14px;
        }

        .message-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: white;
        }

        .message {
            margin: 5px 0;
            padding: 8px;
            border-radius: 3px;
            font-size: 13px;
            word-break: break-all;
        }

        .message.incoming {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
        }

        .message.outgoing {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }

        .message.system {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
        }

        .message.error {
            background: #ffebee;
            border-left: 3px solid #f44336;
        }

        .message .time {
            color: #666;
            font-size: 11px;
            margin-right: 5px;
        }

        .message .type {
            font-weight: bold;
            margin-right: 5px;
        }

        .message .content {
            color: #333;
        }

        .message .json-content {
            background: #f5f5f5;
            padding: 5px;
            margin-top: 5px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .message .binary-content {
            background: #e8f5e9;
            padding: 5px;
            margin-top: 5px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .auto-send {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .auto-send input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .auto-send label {
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat .label {
            color: #666;
        }

        .stat .value {
            font-weight: bold;
            color: #667eea;
        }

        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
        }

        .file-input {
            margin-top: 10px;
        }

        .file-input input[type="file"] {
            display: none;
        }

        .file-input label {
            display: inline-block;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-input label:hover {
            background: #5568d3;
        }

        .proto-info {
            margin-top: 10px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
            font-size: 13px;
        }

        .proto-info .file-name {
            font-weight: bold;
            color: #1976d2;
        }

        .proto-info .message-count {
            color: #666;
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WebSocket 在线测试工具</h1>
            <div class="status" id="status">状态: 尚未连接</div>
        </div>

        <div class="content">
            <div class="section">
                <h3>服务器配置</h3>
                <div class="input-group">
                    <input type="text" id="serverUrl" value="ws://localhost:8080/ws" placeholder="WebSocket 服务器地址">
                    <button class="btn-primary" onclick="connect()">连接</button>
                    <button class="btn-danger" onclick="disconnect()">断开</button>
                </div>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <div class="checkbox-group">
                        <input type="checkbox" id="autoPing" checked>
                        <label for="autoPing">自动发送 Ping</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label>间隔:</label>
                        <input type="number" id="pingInterval" value="30" min="5" max="300" style="width: 80px; padding: 5px; border: 1px solid #ddd; border-radius: 3px;">
                        <label>秒</label>
                    </div>
                </div>
                <div style="margin-top: 10px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 14px;">历史服务器地址:</label>
                    <select id="serverHistory" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px;">
                        <option value="">-- 选择历史地址 --</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <h3>Protobuf 配置</h3>
                <div class="file-input">
                    <label for="protoFile">选择 .proto 文件</label>
                    <input type="file" id="protoFile" accept=".proto" onchange="loadProtoFile(event)">
                </div>
                <div id="protoInfo" class="proto-info" style="display: none;">
                    <div class="file-name" id="protoFileName"></div>
                    <div class="message-count" id="protoMessageCount"></div>
                </div>
                <div style="margin-top: 10px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 14px;">选择消息类型:</label>
                    <select id="messageType" onchange="updateMessageTemplate()">
                        <option value="">-- 请先加载 .proto 文件 --</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <h3>发包设置</h3>
                <div class="checkbox-group" style="margin-bottom: 10px;">
                    <input type="checkbox" id="useProtobuf" onchange="toggleInputMode()">
                    <label for="useProtobuf">使用 Protobuf (JSON 转 Binary)</label>
                </div>
                <textarea id="messageInput" placeholder="输入要发送的消息内容（支持 JSON 格式）"></textarea>
                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn-success" onclick="sendMessage()">发送消息</button>
                    <button class="btn-warning" onclick="clearInput()">清空输入</button>
                </div>
                <div class="auto-send">
                    <label>每隔</label>
                    <input type="number" id="interval" value="5" min="1" max="60">
                    <label>秒发送内容</label>
                    <button class="btn-info" onclick="toggleAutoSend()" id="autoSendBtn">开始自动发送</button>
                    <div class="checkbox-group">
                        <input type="checkbox" id="clearAfterSend">
                        <label for="clearAfterSend">发包清空输入</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>调试消息</h3>
                <div class="message-container" id="messageContainer"></div>
                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn-warning" onclick="clearMessages()">清空消息</button>
                    <div class="checkbox-group">
                        <input type="checkbox" id="jsonDecode" checked>
                        <label for="jsonDecode">收包JSON解码</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="pauseReceive">
                        <label for="pauseReceive">暂停接收</label>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="label">发送:</span>
                        <span class="value" id="sentCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">接收:</span>
                        <span class="value" id="receivedCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">错误:</span>
                        <span class="value" id="errorCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let autoSendInterval = null;
        let pingInterval = null;
        let sentCount = 0;
        let receivedCount = 0;
        let errorCount = 0;
        let protoRoot = null;
        let currentMessageType = null;
        
        // 初始化历史服务器地址
        function initServerHistory() {
            const history = getServerHistory();
            const select = document.getElementById('serverHistory');
            select.innerHTML = '<option value="">-- 选择历史地址 --</option>';
            
            history.forEach(url => {
                const option = document.createElement('option');
                option.value = url;
                option.textContent = url;
                select.appendChild(option);
            });
        }
        
        // 获取历史服务器地址
        function getServerHistory() {
            const history = localStorage.getItem('wsServerHistory');
            return history ? JSON.parse(history) : [];
        }
        
        // 添加服务器地址到历史记录
        function addServerToHistory(url) {
            let history = getServerHistory();
            // 移除重复的地址
            history = history.filter(item => item !== url);
            // 添加到开头
            history.unshift(url);
            // 限制历史记录数量
            if (history.length > 10) {
                history = history.slice(0, 10);
            }
            localStorage.setItem('wsServerHistory', JSON.stringify(history));
            initServerHistory();
        }
        
        // 从本地存储加载设置
        function loadSettings() {
            const savedUrl = localStorage.getItem('wsServerUrl');
            if (savedUrl) {
                document.getElementById('serverUrl').value = savedUrl;
            }
            
            const savedPing = localStorage.getItem('wsAutoPing');
            if (savedPing) {
                document.getElementById('autoPing').checked = savedPing === 'true';
            }
            
            const savedPingInterval = localStorage.getItem('wsPingInterval');
            if (savedPingInterval) {
                document.getElementById('pingInterval').value = savedPingInterval;
            }
        }
        
        // 保存设置到本地存储
        function saveSettings() {
            const url = document.getElementById('serverUrl').value;
            const autoPing = document.getElementById('autoPing').checked;
            const pingInterval = document.getElementById('pingInterval').value;
            
            localStorage.setItem('wsServerUrl', url);
            localStorage.setItem('wsAutoPing', autoPing);
            localStorage.setItem('wsPingInterval', pingInterval);
        }

        // 加载 Proto 文件
        async function loadProtoFile(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            try {
                const content = await file.text();
                protoRoot = await protobuf.parse(content).root;
                
                // 显示文件信息
                document.getElementById('protoInfo').style.display = 'block';
                // 确保只显示文件名，不显示路径
                const fileName = file.name;
                document.getElementById('protoFileName').textContent = '文件: ' + fileName;
                
                // 获取所有消息类型（包括嵌套的）
                const messageTypes = [];
                const messageTypeMap = new Map(); // 存储消息类型的完整路径
                
                // 递归遍历获取所有消息类型
                function findMessageTypes(ns, prefix = '') {
                    if (ns instanceof protobuf.Type) {
                        const fullName = prefix ? prefix + '.' + ns.name : ns.name;
                        messageTypes.push(ns.name);
                        messageTypeMap.set(ns.name, fullName);
                    }
                    if (ns.nestedArray) {
                        ns.nestedArray.forEach(nested => {
                            const newPrefix = prefix ? prefix + '.' + nested.name : nested.name;
                            findMessageTypes(nested, newPrefix);
                        });
                    }
                }
                
                // 遍历根级嵌套
                protoRoot.nestedArray.forEach(nested => {
                    findMessageTypes(nested);
                });
                
                document.getElementById('protoMessageCount').textContent = '消息类型数量: ' + messageTypes.length;
                
                // 填充消息类型下拉菜单
                const messageTypeSelect = document.getElementById('messageType');
                messageTypeSelect.innerHTML = '<option value="">-- 选择消息类型 --</option>';
                messageTypes.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    messageTypeSelect.appendChild(option);
                });
                
                // 存储消息类型映射
                window.messageTypeMap = messageTypeMap;
                
                addMessage('system', 'Proto 文件加载成功: ' + fileName);
            } catch (error) {
                addMessage('error', 'Proto 文件解析失败: ' + error.message);
                errorCount++;
                updateStats();
            }
        }

        // 更新消息模板
        function updateMessageTemplate() {
            const messageType = document.getElementById('messageType').value;
            if (!messageType || !protoRoot) {
                return;
            }

            currentMessageType = messageType;
            
            // 尝试直接查找消息类型
            let message;
            try {
                message = protoRoot.lookupType(messageType);
            } catch (e) {
                // 如果直接查找失败，尝试使用映射中的完整路径
                if (window.messageTypeMap) {
                    const fullName = window.messageTypeMap.get(messageType);
                    if (fullName) {
                        message = protoRoot.lookupType(fullName);
                    }
                }
            }
            
            if (!message) {
                addMessage('error', '找不到消息类型: ' + messageType);
                return;
            }
            
            // 生成空消息的 JSON 模板
            const emptyMessage = message.create();
            const template = JSON.stringify(emptyMessage, null, 2);
            
            document.getElementById('messageInput').value = template;
            addMessage('system', '已加载消息类型: ' + messageType);
        }

        // 切换输入模式
        function toggleInputMode() {
            const useProtobuf = document.getElementById('useProtobuf').checked;
            const placeholder = useProtobuf 
                ? '输入 JSON 格式的消息数据' 
                : '输入要发送的消息内容（支持 JSON 格式）';
            document.getElementById('messageInput').placeholder = placeholder;
        }

        // JSON 转 Protobuf 二进制
        function jsonToProtobuf(jsonString, messageType) {
            if (!protoRoot || !messageType) {
                throw new Error('请先加载 Proto 文件并选择消息类型');
            }

            // 尝试直接查找消息类型
            let message;
            try {
                message = protoRoot.lookupType(messageType);
            } catch (e) {
                // 如果直接查找失败，尝试使用映射中的完整路径
                if (window.messageTypeMap) {
                    const fullName = window.messageTypeMap.get(messageType);
                    if (fullName) {
                        message = protoRoot.lookupType(fullName);
                    }
                }
            }
            
            if (!message) {
                throw new Error('找不到消息类型: ' + messageType);
            }

            const payload = message.fromObject(JSON.parse(jsonString));
            const buffer = message.encode(payload).finish();
            
            return buffer;
        }

        // Protobuf 二进制转 JSON
        function protobufToJson(buffer, messageType) {
            if (!protoRoot || !messageType) {
                throw new Error('请先加载 Proto 文件并选择消息类型');
            }

            // 尝试直接查找消息类型
            let message;
            try {
                message = protoRoot.lookupType(messageType);
            } catch (e) {
                // 如果直接查找失败，尝试使用映射中的完整路径
                if (window.messageTypeMap) {
                    const fullName = window.messageTypeMap.get(messageType);
                    if (fullName) {
                        message = protoRoot.lookupType(fullName);
                    }
                }
            }
            
            if (!message) {
                throw new Error('找不到消息类型: ' + messageType);
            }
            const decoded = message.decode(new Uint8Array(buffer));
            return message.toObject(decoded);
        }

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            if (!serverUrl) {
                addMessage('system', '请输入服务器地址');
                return;
            }

            // 保存设置并添加到历史记录
            saveSettings();
            addServerToHistory(serverUrl);

            try {
                ws = new WebSocket(serverUrl);
                updateStatus('connecting', '连接中...');

                ws.onopen = function() {
                    updateStatus('connected', '已连接');
                    addMessage('system', 'WebSocket 连接成功');
                    startPing();
                };

                ws.onmessage = function(event) {
                    if (document.getElementById('pauseReceive').checked) {
                        return;
                    }

                    receivedCount++;
                    updateStats();

                    const data = event.data;
                    const jsonDecode = document.getElementById('jsonDecode').checked;
                    const useProtobuf = document.getElementById('useProtobuf').checked;

                    if (useProtobuf && currentMessageType && data instanceof ArrayBuffer) {
                        try {
                            const jsonData = protobufToJson(new Uint8Array(data), currentMessageType);
                            addMessage('incoming', '收到消息', 'Binary', JSON.stringify(jsonData, null, 2));
                        } catch (e) {
                            addMessage('incoming', '收到消息', 'Binary (解析失败)', arrayBufferToHex(data));
                        }
                    } else if (jsonDecode) {
                        try {
                            const jsonData = JSON.parse(data);
                            addMessage('incoming', '收到消息', data, JSON.stringify(jsonData, null, 2));
                        } catch (e) {
                            addMessage('incoming', '收到消息', data);
                        }
                    } else {
                        addMessage('incoming', '收到消息', data);
                    }
                };

                ws.onclose = function() {
                    updateStatus('disconnected', '已断开');
                    addMessage('system', 'WebSocket 连接已关闭');
                    stopAutoSend();
                };

                ws.onerror = function(error) {
                    updateStatus('error', '连接错误');
                    addMessage('error', 'WebSocket 错误: ' + error);
                    errorCount++;
                    updateStats();
                };
            } catch (error) {
                updateStatus('error', '连接失败');
                addMessage('error', '连接失败: ' + error.message);
                errorCount++;
                updateStats();
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            stopAutoSend();
            stopPing();
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('error', 'WebSocket 未连接');
                errorCount++;
                updateStats();
                return;
            }

            const message = document.getElementById('messageInput').value;
            if (!message) {
                addMessage('error', '请输入消息内容');
                errorCount++;
                updateStats();
                return;
            }

            try {
                const useProtobuf = document.getElementById('useProtobuf').checked;
                
                if (useProtobuf) {
                    if (!currentMessageType) {
                        addMessage('error', '请先选择消息类型');
                        errorCount++;
                        updateStats();
                        return;
                    }
                    
                    // 转换为 Protobuf 二进制
                    const buffer = jsonToProtobuf(message, currentMessageType);
                    ws.send(buffer);
                    
                    sentCount++;
                    updateStats();
                    
                    addMessage('outgoing', '发送消息', 'JSON', message);
                    addMessage('outgoing', '发送消息', 'Binary', arrayBufferToHex(buffer));
                } else {
                    // 直接发送文本
                    ws.send(message);
                    sentCount++;
                    updateStats();

                    const jsonDecode = document.getElementById('jsonDecode').checked;
                    if (jsonDecode) {
                        try {
                            const jsonData = JSON.parse(message);
                            addMessage('outgoing', '发送消息', message, JSON.stringify(jsonData, null, 2));
                        } catch (e) {
                            addMessage('outgoing', '发送消息', message);
                        }
                    } else {
                        addMessage('outgoing', '发送消息', message);
                    }
                }

                if (document.getElementById('clearAfterSend').checked) {
                    clearInput();
                }
            } catch (error) {
                addMessage('error', '发送失败: ' + error.message);
                errorCount++;
                updateStats();
            }
        }

        // ArrayBuffer 转 Hex 字符串
        function arrayBufferToHex(buffer) {
            const bytes = new Uint8Array(buffer);
            return Array.from(bytes).map(byte => byte.toString(16).padStart(2, '0')).join(' ');
        }

        function toggleAutoSend() {
            if (autoSendInterval) {
                stopAutoSend();
            } else {
                startAutoSend();
            }
        }

        function startAutoSend() {
            const interval = parseInt(document.getElementById('interval').value);
            if (isNaN(interval) || interval < 1) {
                addMessage('error', '请输入有效的间隔时间');
                return;
            }

            const message = document.getElementById('messageInput').value;
            if (!message) {
                addMessage('error', '请输入要发送的消息内容');
                return;
            }

            autoSendInterval = setInterval(function() {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    sendMessage();
                } else {
                    stopAutoSend();
                    addMessage('error', 'WebSocket 未连接，停止自动发送');
                }
            }, interval * 1000);

            document.getElementById('autoSendBtn').textContent = '停止自动发送';
            document.getElementById('autoSendBtn').classList.remove('btn-info');
            document.getElementById('autoSendBtn').classList.add('btn-danger');
            addMessage('system', '开始自动发送，间隔 ' + interval + ' 秒');
        }

        function stopAutoSend() {
            if (autoSendInterval) {
                clearInterval(autoSendInterval);
                autoSendInterval = null;
                document.getElementById('autoSendBtn').textContent = '开始自动发送';
                document.getElementById('autoSendBtn').classList.remove('btn-danger');
                document.getElementById('autoSendBtn').classList.add('btn-info');
                addMessage('system', '停止自动发送');
            }
        }

        function startPing() {
            if (document.getElementById('autoPing').checked) {
                stopPing(); // 先停止之前的 ping 定时器
                const interval = parseInt(document.getElementById('pingInterval').value);
                if (isNaN(interval) || interval < 5) {
                    addMessage('error', '请输入有效的 Ping 间隔时间（至少5秒）');
                    return;
                }
                
                pingInterval = setInterval(function() {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        const pingMsg = JSON.stringify({ type: 'ping' });
                        try {
                            ws.send(pingMsg);
                            addMessage('outgoing', '发送 Ping', pingMsg);
                        } catch (error) {
                            addMessage('error', '发送 Ping 失败: ' + error.message);
                            errorCount++;
                            updateStats();
                        }
                    } else {
                        stopPing();
                    }
                }, interval * 1000); // 使用用户设置的间隔时间
                addMessage('system', '开始自动发送 Ping (' + interval + '秒)');
            }
        }

        function stopPing() {
            if (pingInterval) {
                clearInterval(pingInterval);
                pingInterval = null;
                addMessage('system', '停止自动发送 Ping');
            }
        }

        function clearInput() {
            document.getElementById('messageInput').value = '';
        }

        function clearMessages() {
            document.getElementById('messageContainer').innerHTML = '';
        }

        function addMessage(type, title, content, extraContent = null) {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;

            const time = new Date().toLocaleTimeString();
            let html = '<span class="time">' + time + '</span>';
            html += '<span class="type">' + title + ':</span>';
            html += '<span class="content">' + content + '</span>';

            if (extraContent) {
                if (type === 'incoming' && content === 'Binary') {
                    html += '<div class="binary-content">' + extraContent + '</div>';
                } else {
                    html += '<div class="json-content">' + extraContent + '</div>';
                }
            }

            messageDiv.innerHTML = html;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(status, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = '状态: ' + message;
            statusDiv.className = 'status ' + status;
        }

        function updateStats() {
            document.getElementById('sentCount').textContent = sentCount;
            document.getElementById('receivedCount').textContent = receivedCount;
            document.getElementById('errorCount').textContent = errorCount;
        }

        // 监听 autoPing 复选框的状态变化
        document.getElementById('autoPing').addEventListener('change', function() {
            saveSettings();
            if (ws && ws.readyState === WebSocket.OPEN) {
                if (this.checked) {
                    startPing();
                } else {
                    stopPing();
                }
            }
        });
        
        // 监听 pingInterval 输入框的变化
        document.getElementById('pingInterval').addEventListener('change', function() {
            saveSettings();
            if (ws && ws.readyState === WebSocket.OPEN && document.getElementById('autoPing').checked) {
                startPing(); // 重新启动 ping 定时器以应用新的间隔
            }
        });
        
        // 监听 serverHistory 下拉菜单的变化
        document.getElementById('serverHistory').addEventListener('change', function() {
            const selectedUrl = this.value;
            if (selectedUrl) {
                document.getElementById('serverUrl').value = selectedUrl;
                saveSettings();
            }
        });

        // 页面加载完成时初始化
        window.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            initServerHistory();
        });

        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
            stopAutoSend();
            stopPing();
        });
    </script>
</body>
</html>
