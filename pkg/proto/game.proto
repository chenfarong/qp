syntax = "proto3";

package game;

option go_package = "github.com/aoyo/qp/pkg/proto/game";

// GameService 游戏服务
service GameService {
  // CreateCharacter 创建角色
  rpc CreateCharacter(CreateCharacterRequest) returns (CreateCharacterResponse) {}
  // GetCharacters 获取用户的所有角色
  rpc GetCharacters(GetCharactersRequest) returns (GetCharactersResponse) {}
  // GetCharacter 获取角色详情
  rpc GetCharacter(GetCharacterRequest) returns (GetCharacterResponse) {}
  // UpdateCharacterStatus 更新角色状态
  rpc UpdateCharacterStatus(UpdateCharacterStatusRequest) returns (UpdateCharacterStatusResponse) {}
  // Battle 战斗
  rpc Battle(BattleRequest) returns (BattleResponse) {}
}

// CreateCharacterRequest 创建角色请求
message CreateCharacterRequest {
  uint32 user_id = 1;
  string name = 2;
}

// CreateCharacterResponse 创建角色响应
message CreateCharacterResponse {
  Character character = 1;
  string error = 2;
}

// GetCharactersRequest 获取角色列表请求
message GetCharactersRequest {
  uint32 user_id = 1;
}

// GetCharactersResponse 获取角色列表响应
message GetCharactersResponse {
  repeated Character characters = 1;
  string error = 2;
}

// GetCharacterRequest 获取角色详情请求
message GetCharacterRequest {
  uint32 character_id = 1;
}

// GetCharacterResponse 获取角色详情响应
message GetCharacterResponse {
  Character character = 1;
  string error = 2;
}

// UpdateCharacterStatusRequest 更新角色状态请求
message UpdateCharacterStatusRequest {
  uint32 character_id = 1;
  int32 status = 2;
}

// UpdateCharacterStatusResponse 更新角色状态响应
message UpdateCharacterStatusResponse {
  string message = 1;
  string error = 2;
}

// BattleRequest 战斗请求
message BattleRequest {
  uint32 character_id = 1;
  int32 enemy_level = 2;
}

// BattleResponse 战斗响应
message BattleResponse {
  bool victory = 1;
  int32 exp_gained = 2;
  int32 gold_gained = 3;
  string message = 4;
  string error = 5;
}

// Character 角色信息
message Character {
  uint32 id = 1;
  uint32 user_id = 2;
  string name = 3;
  int32 level = 4;
  int32 exp = 5;
  int32 hp = 6;
  int32 mp = 7;
  int32 strength = 8;
  int32 agility = 9;
  int32 intelligence = 10;
  int32 gold = 11;
  int32 status = 12;
}
