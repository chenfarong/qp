syntax = "proto3";

package auth;

option go_package = "github.com/aoyo/qp/pkg/proto/auth";

// AuthService 认证服务
service AuthService {
  // Register 用户注册
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  // Login 用户登录
  rpc Login(LoginRequest) returns (LoginResponse) {}
  // Validate 验证令牌
  rpc Validate(ValidateRequest) returns (ValidateResponse) {}
}

// RegisterRequest 注册请求
message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string nickname = 4;
}

// RegisterResponse 注册响应
message RegisterResponse {
  string token = 1;
  int64 expire_at = 2;
  User user_info = 3;
  string error = 4;
}

// LoginRequest 登录请求
message LoginRequest {
  string username = 1;
  string password = 2;
}

// LoginResponse 登录响应
message LoginResponse {
  string token = 1;
  int64 expire_at = 2;
  User user_info = 3;
  string error = 4;
}

// ValidateRequest 验证请求
message ValidateRequest {
  string token = 1;
}

// ValidateResponse 验证响应
message ValidateResponse {
  uint32 user_id = 1;
  User user = 2;
  string error = 3;
}

// User 用户信息
message User {
  uint32 id = 1;
  string username = 2;
  string email = 3;
  string nickname = 4;
  string avatar = 5;
  int32 status = 6;
}
