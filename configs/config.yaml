# sandbox=true：开发/沙箱（不使用 etcd）
# 不写 sandbox 或 sandbox=false：生产（连接 etcd）
sandbox: true

# Server Configuration（HTTP port + gRPC 独立监听端口）
server:
  gateway:
    port: 9080
    grpc_port: 10080
  gamelogic:
    port: 9000
    grpc_port: 10000
  ssoauth:
    port: 9090
    grpc_port: 10090
  bill:
    port: 9100
    grpc_port: 10100
  chat:
    port: 9110
    grpc_port: 10110
  logger:
    udp_port: 514

# MongoDB Configuration
database:
  host: 192.168.175.128
  port: 27017
  user: ""
  password: ""
  dbname: qp_game

# WebSocket Configuration
websocket:
  path: /ws
  read_buffer_size: 1024
  write_buffer_size: 1024

# JWT Configuration
jwt:
  secret: your_jwt_secret_key
  expire_hours: 24

# Etcd Configuration
etcd:
  endpoints:
    - 127.0.0.1:2379
