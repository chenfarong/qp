syntax = "proto3";

package chat;

option go_package = "github.com/aoyo/qp/pkg/proto/chat";

// ChatService 聊天服务
service ChatService {
  // SendMessage 发送消息
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse) {}
  // GetMessages 获取消息历史
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse) {}
  // GetConversations 获取会话列表
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse) {}
  // UpdateMessageStatus 更新消息状态
  rpc UpdateMessageStatus(UpdateMessageStatusRequest) returns (UpdateMessageStatusResponse) {}
}

// SendMessageRequest 发送消息请求
message SendMessageRequest {
  uint32 sender_id = 1;
  uint32 receiver_id = 2;
  string content = 3;
  string type = 4;
}

// SendMessageResponse 发送消息响应
message SendMessageResponse {
  Message message = 1;
  string error = 2;
}

// GetMessagesRequest 获取消息历史请求
message GetMessagesRequest {
  uint32 user_id = 1;
  uint32 other_user_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

// GetMessagesResponse 获取消息历史响应
message GetMessagesResponse {
  repeated Message messages = 1;
  string error = 2;
}

// GetConversationsRequest 获取会话列表请求
message GetConversationsRequest {
  uint32 user_id = 1;
}

// GetConversationsResponse 获取会话列表响应
message GetConversationsResponse {
  repeated Conversation conversations = 1;
  string error = 2;
}

// UpdateMessageStatusRequest 更新消息状态请求
message UpdateMessageStatusRequest {
  uint32 message_id = 1;
  string status = 2;
}

// UpdateMessageStatusResponse 更新消息状态响应
message UpdateMessageStatusResponse {
  string message = 1;
  string error = 2;
}

// Message 消息信息
message Message {
  uint32 id = 1;
  uint32 sender_id = 2;
  uint32 receiver_id = 3;
  string content = 4;
  string type = 5;
  string status = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

// Conversation 会话信息
message Conversation {
  uint32 id = 1;
  repeated uint32 user_ids = 2;
  string last_message = 3;
  int64 last_message_time = 4;
  int32 unread_count = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}
