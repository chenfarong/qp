syntax = "proto3";

package gateway;

option go_package = "github.com/aoyo/qp/pkg/proto/gateway";

// GatewayService 网关服务
service GatewayService {
  // RegisterProtocolRange 注册服务能接收的协议编号段
  rpc RegisterProtocolRange(RegisterProtocolRangeRequest) returns (RegisterProtocolRangeResponse) {}
}

// RegisterProtocolRangeRequest 注册协议编号段请求
message RegisterProtocolRangeRequest {
  string service_name = 1;           // 服务名称
  string service_address = 2;        // 服务地址
  int32 start_protocol = 3;          // 起始协议编号
  int32 end_protocol = 4;            // 结束协议编号
}

// RegisterProtocolRangeResponse 注册协议编号段响应
message RegisterProtocolRangeResponse {
  bool success = 1;
  string error = 2;
}