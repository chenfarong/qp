syntax = "proto3";

package proto;

option go_package = "github.com/aoyo/qp/pkg/proto";

// MessageType 消息类型枚举
enum MessageType {
  MSG_TYPE_UNKNOWN = 0;
  
  // SSO Auth 协议 (1-100)
  MSG_TYPE_AUTH_REGISTER = 1;
  MSG_TYPE_AUTH_LOGIN = 2;
  MSG_TYPE_AUTH_VALIDATE = 3;
  
  // Game Logic 协议 (101-200)
  MSG_TYPE_GAME_CREATE_CHARACTER = 101;
  MSG_TYPE_GAME_GET_CHARACTERS = 102;
  MSG_TYPE_GAME_GET_CHARACTER = 103;
  MSG_TYPE_GAME_UPDATE_CHARACTER_STATUS = 104;
  MSG_TYPE_GAME_BATTLE = 105;
  MSG_TYPE_GAME_GET_BAG = 106;
  
  // Bill 协议 (201-300)
  MSG_TYPE_BILL_CREATE_PAYMENT = 201;
  MSG_TYPE_BILL_GET_PAYMENT = 202;
  MSG_TYPE_BILL_UPDATE_PAYMENT_STATUS = 203;
  MSG_TYPE_BILL_GET_USER_PAYMENTS = 204;
  
  // Chat 协议 (301-400)
  MSG_TYPE_CHAT_SEND_MESSAGE = 301;
  MSG_TYPE_CHAT_GET_MESSAGES = 302;
  MSG_TYPE_CHAT_GET_CONVERSATIONS = 303;
  MSG_TYPE_CHAT_UPDATE_MESSAGE_STATUS = 304;
  
  // 响应消息
  MSG_TYPE_RESPONSE = 999;
}

// Message 通用消息包装器
message Message {
  MessageType type = 1; // 消息类型
  oneof data {
    // Auth 消息
    AuthRegister auth_register = 101;
    AuthLogin auth_login = 102;
    AuthValidate auth_validate = 103;
    
    // Game 消息
    GameCreateCharacter game_create_character = 201;
    GameGetCharacters game_get_characters = 202;
    GameGetCharacter game_get_character = 203;
    GameUpdateCharacterStatus game_update_character_status = 204;
    GameBattle game_battle = 205;
    GameGetBag game_get_bag = 206;
    
    // Bill 消息
    BillCreatePayment bill_create_payment = 301;
    BillGetPayment bill_get_payment = 302;
    BillUpdatePaymentStatus bill_update_payment_status = 303;
    BillGetUserPayments bill_get_user_payments = 304;
    
    // Chat 消息
    ChatSendMessage chat_send_message = 401;
    ChatGetMessages chat_get_messages = 402;
    ChatGetConversations chat_get_conversations = 403;
    ChatUpdateMessageStatus chat_update_message_status = 404;
    
    // 响应消息
    Response response = 999;
  }
}

// Auth 消息
message AuthRegister {
  string username = 1;
  string password = 2;
  string email = 3;
  string nickname = 4;
}

message AuthLogin {
  string username = 1;
  string password = 2;
}

message AuthValidate {
  string token = 1;
}

// Game 消息
message GameCreateCharacter {
  uint32 user_id = 1;
  string name = 2;
}

message GameGetCharacters {
  uint32 user_id = 1;
}

message GameGetCharacter {
  uint32 character_id = 1;
}

message GameUpdateCharacterStatus {
  uint32 character_id = 1;
  int32 status = 2;
}

message GameBattle {
  uint32 character_id = 1;
  int32 enemy_level = 2;
}

message GameGetBag {
  uint32 user_id = 1;
}

// Bill 消息
message BillCreatePayment {
  uint32 user_id = 1;
  string product_id = 2;
  string amount = 3;
  string payment_method = 4;
}

message BillGetPayment {
  uint32 payment_id = 1;
}

message BillUpdatePaymentStatus {
  uint32 payment_id = 1;
  string status = 2;
}

message BillGetUserPayments {
  uint32 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// Chat 消息
message ChatSendMessage {
  uint32 sender_id = 1;
  uint32 receiver_id = 2;
  string content = 3;
  string type = 4;
}

message ChatGetMessages {
  uint32 user_id = 1;
  uint32 other_user_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ChatGetConversations {
  uint32 user_id = 1;
}

message ChatUpdateMessageStatus {
  uint32 message_id = 1;
  string status = 2;
}

// 响应消息
message Response {
  int32 code = 1;
  string message = 2;
  oneof data {
    AuthResponse auth_response = 101;
    GameResponse game_response = 201;
    BillResponse bill_response = 301;
    ChatResponse chat_response = 401;
  }
}

// 具体响应消息
message AuthResponse {
  string token = 1;
  string user_id = 2;
  string username = 3;
  string nickname = 4;
}

message GameResponse {
  oneof data {
    Character character = 1;
    CharacterList characters = 2;
    BattleResult battle_result = 3;
    BagItemList bag_items = 4;
  }
}

message BillResponse {
  oneof data {
    Payment payment = 1;
    PaymentList payments = 2;
    int32 total = 3;
  }
}

message ChatResponse {
  oneof data {
    Message chat_message = 1;
    MessageList chat_messages = 2;
    ConversationList conversations = 3;
  }
}

// 列表包装器
message CharacterList {
  repeated Character items = 1;
}

message BagItemList {
  repeated BagItemData items = 1;
}

message PaymentList {
  repeated Payment items = 1;
}

message MessageList {
  repeated Message items = 1;
}

message ConversationList {
  repeated Conversation items = 1;
}

// 引用其他proto文件中的消息结构
message Character {
  uint32 id = 1;
  uint32 user_id = 2;
  string name = 3;
  int32 level = 4;
  int32 exp = 5;
  int32 hp = 6;
  int32 mp = 7;
  int32 strength = 8;
  int32 agility = 9;
  int32 intelligence = 10;
  int32 gold = 11;
  int32 status = 12;
}

message BattleResult {
  bool victory = 1;
  int32 exp_gained = 2;
  int32 gold_gained = 3;
  string message = 4;
}

message BagItemData {
  int64 item_id = 1;
  int32 item_cfg_id = 2;
  int64 num = 3;
}

message Payment {
  uint32 id = 1;
  uint32 user_id = 2;
  string product_id = 3;
  string amount = 4;
  string payment_method = 5;
  string status = 6;
  string transaction_id = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message Conversation {
  uint32 id = 1;
  repeated uint32 user_ids = 2;
  string last_message = 3;
  int64 last_message_time = 4;
  int32 unread_count = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}
