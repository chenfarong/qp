syntax = "proto3";

package proto;

// AuthRegisterRequest 注册请求
message AuthRegisterRequest {
  string username = 1;   // 用户名
  string password = 2;   // 密码
  string email = 3;      // 邮箱
  string phone = 4;     // 手机号
}

// AuthRegisterResponse 注册响应
message AuthRegisterResponse {
  bool success = 1;      // 是否成功
  string user_id = 2;    // 用户ID
  string token = 3;      // 令牌
  string message = 4;    // 消息
}

// AuthLoginRequest 登录请求
message AuthLoginRequest {
  string username = 1;   // 用户名
  string password = 2;   // 密码
}

// AuthLoginResponse 登录响应
message AuthLoginResponse {
  bool success = 1;      // 是否成功
  string user_id = 2;    // 用户ID
  string token = 3;      // 令牌
  string message = 4;    // 消息
}

// AuthValidateRequest 验证请求
message AuthValidateRequest {
  string token = 1;      // 令牌
}

// AuthValidateResponse 验证响应
message AuthValidateResponse {
  bool success = 1;      // 是否成功
  string user_id = 2;    // 用户ID
  string message = 3;    // 消息
}