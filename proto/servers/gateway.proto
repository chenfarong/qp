syntax = "proto3";

package proto;

// GatewayMessage 网关消息
message GatewayMessage {
  int32 msg_id = 1;      // 消息ID
  string service_name = 2; // 服务名称
  bytes data = 3;         // 消息数据
}

// GatewayRegisterRequest 网关注册请求
message GatewayRegisterRequest {
  string service_name = 1;  // 服务名称
  string service_address = 2; // 服务地址
  int32 start_protocol = 3;  // 起始协议号
  int32 end_protocol = 4;    // 结束协议号
}

// GatewayRegisterResponse 网关注册响应
message GatewayRegisterResponse {
  bool success = 1;   // 是否成功
  string error = 2;    // 错误信息
}

// GatewayPushMessageRequest 网关推送消息请求
message GatewayPushMessageRequest {
  uint32 user_id = 1;     // 用户ID
  string message_type = 2; // 消息类型
  bytes message_data = 3; // 消息数据
  string title = 4;       // 标题
  string content = 5;     // 内容
}

// GatewayPushMessageResponse 网关推送消息响应
message GatewayPushMessageResponse {
  bool success = 1;             // 是否成功
  int32 connected_clients = 2;   // 连接的客户端数量
  string error = 3;              // 错误信息
}

// GatewayBroadcastMessageRequest 网关广播消息请求
message GatewayBroadcastMessageRequest {
  string message_type = 1; // 消息类型
  bytes message_data = 2;  // 消息数据
  string title = 3;        // 标题
  string content = 4;      // 内容
}

// GatewayBroadcastMessageResponse 网关广播消息响应
message GatewayBroadcastMessageResponse {
  bool success = 1;          // 是否成功
  int32 broadcast_count = 2; // 广播数量
  string error = 3;         // 错误信息
}

// GatewayGetConnectedUsersRequest 获取连接用户请求
message GatewayGetConnectedUsersRequest {
}

// GatewayGetConnectedUsersResponse 获取连接用户响应
message GatewayGetConnectedUsersResponse {
  repeated uint32 user_ids = 1; // 用户ID列表
  int32 total_users = 2;        // 总用户数
}