syntax = "proto3";

package proto;

// ChatSendMessageRequest 发送消息请求
message ChatSendMessageRequest {
  uint32 sender_id = 1;     // 发送者ID
  uint32 receiver_id = 2;   // 接收者ID
  string content = 3;      // 消息内容
  string type = 4;          // 消息类型
}

// ChatSendMessageResponse 发送消息响应
message ChatSendMessageResponse {
  bool success = 1;        // 是否成功
  uint32 message_id = 2;   // 消息ID
  string message = 3;     // 消息
}

// ChatGetMessagesRequest 获取消息历史请求
message ChatGetMessagesRequest {
  uint32 user_id = 1;       // 用户ID
  uint32 other_user_id = 2;  // 对方用户ID
  int32 page = 3;           // 页码
  int32 page_size = 4;      // 每页大小
}

// ChatGetMessagesResponse 获取消息历史响应
message ChatGetMessagesResponse {
  bool success = 1;                 // 是否成功
  repeated ChatMessage messages = 2; // 消息列表
  string message = 3;               // 消息
}

// ChatMessage 聊天消息
message ChatMessage {
  uint32 id = 1;          // 消息ID
  uint32 sender_id = 2;   // 发送者ID
  uint32 receiver_id = 3; // 接收者ID
  string content = 4;    // 消息内容
  string type = 5;        // 消息类型
  string status = 6;     // 状态
  int64 created_at = 7;  // 创建时间
  int64 updated_at = 8;  // 更新时间
}

// ChatGetConversationsRequest 获取会话列表请求
message ChatGetConversationsRequest {
  uint32 user_id = 1;      // 用户ID
  int32 page = 2;          // 页码
  int32 page_size = 3;     // 每页大小
}

// ChatGetConversationsResponse 获取会话列表响应
message ChatGetConversationsResponse {
  bool success = 1;                       // 是否成功
  repeated Conversation conversations = 2; // 会话列表
  string message = 3;                     // 消息
}

// Conversation 会话信息
message Conversation {
  uint32 id = 1;                // 会话ID
  repeated uint32 user_ids = 2;  // 用户ID列表
  string last_message = 3;      // 最后一条消息
  int64 last_message_time = 4;  // 最后消息时间
  int32 unread_count = 5;      // 未读消息数
  int64 created_at = 6;        // 创建时间
  int64 updated_at = 7;        // 更新时间
}

// ChatUpdateMessageStatusRequest 更新消息状态请求
message ChatUpdateMessageStatusRequest {
  uint32 message_id = 1;  // 消息ID
  string status = 2;      // 状态
}

// ChatUpdateMessageStatusResponse 更新消息状态响应
message ChatUpdateMessageStatusResponse {
  bool success = 1;      // 是否成功
  string message = 2;    // 消息
}