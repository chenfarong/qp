syntax = "proto3";

package protocli;

import "gamelogic/base.proto";

option go_package = "zgame/pb/golang/gamelogic";



//单物品信息
message ItemData
{
  int64 item_id = 1; //唯一编号
  int32 item_cfg_id = 2; //配表id
  int64 num = 3; //数量
  string ext_info=100;
}

// 获取背包请求
message GetBagRequest {
}

// 获取背包响应
message GetBagResponse {
    ResultErr err=1;
    repeated ItemData data=2;
}


//使用道具
message BagItemUseRequest {
  int64 item_id = 1;  //背包物品中的编号
  int64 num = 2; //使用数量
}

//使用道具返回
message BagItemUseResponse {
  bool success = 1;         // 是否成功
  string message = 2;       // 消息
  ItemData item_data = 3; //请求物品的信息
}

//////////////////////////////////////////////////////////
// 通知
//////////////////////////////////////////////////////////

//道具变化通知
message SyncBagItemChange {
    repeated ItemData data=2;
}

