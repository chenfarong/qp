syntax = "proto3";

package protocli;

import "gamelogic/base.proto";

option go_package = "zgame/pb/golang/gamelogic";

//英雄数据
message HeroData {
  int64 uid=1; //唯一编号
  int32 cfg_id=2; //配表id
  int32 level=3; //等级
  int32 star=4; //星级
  optional string ext_info=5; //附加信息
}


// 获取英雄列表请求
message GetHeroesRequest {
}

// 获取英雄列表响应
message GetHeroesResponse {
  ResultErr err=1;
  repeated HeroData data=2;
}

// 招募英雄请求
message RecruitHeroRequest {
  int32 cfg_id=1; //配表id
}

// 招募英雄返回
message RecruiHeroesResponse {
  ResultErr err=1;
  HeroData data=2;
}

// 英雄升星请求
message UpStarHeroRequest {
  int64 uid=1; //唯一id
}

// 英雄升星返回
message UpStarHeroesResponse {
  ResultErr err=1;
  HeroData data=2;
}

//英雄技能开启
message OpenSkillHeroRequest {
  int64 uid=1; //唯一id
  int32 slot_id=2; //槽位编号
}

//英雄技能升级
message UpSkillHeroRequest {
  int64 uid=1; //唯一id
  int32 slot_id=2; //槽位编号
}


// 英雄技能开启返回
message OpenSkillHeroesResponse {
  ResultErr err=1;
  HeroData data=2;
}


