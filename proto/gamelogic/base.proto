syntax = "proto3";

package protocli;

option go_package = "zgame/pb/golang/gamelogic";

// 标准返回信息顶部
message ResultErr {
    int32 err_code=1; //错误编号
    string err_text=2; //错误信息
}

message GameMoneyItem {
  int32 cfg_id=1; //配表编号
  int64 num=2; //数量
}

// 请求 获取游戏中的货币列表
message GetGameMoneyRequest {
}

// 响应 获取游戏中的货币列表
message GetGameMoneyResponse {
  ResultErr err=1;
  repeated GameMoneyItem data=2;
}

// 同步 游戏中的货币改变
message SyncGameMoneyChange {
  repeated GameMoneyItem data=1;
}


// 基础消息结构
message Message {
  string session = 1;      // 会话ID
  int32 message_id = 2;    // 消息ID
  bytes message_content = 3; // 消息内容
}

// 登录请求
message LoginRequest {
  string name = 1;          // 角色名称
}

// 登录响应
message LoginResponse {
  bool success = 1;         // 是否成功
  Role role = 2;            // 角色信息
  string message = 3;       // 消息
}

// 角色信息
message Role {
  string aid = 1;           // 角色唯一编号
  string name = 2;          // 角色名称
  int32 level = 3;          // 角色等级
  int32 gold = 4;           // 金币
  map<string, int32> bag = 5; // 背包物品
  repeated string heroes = 6; // 英雄列表
  string session = 7;       // 会话ID
}

// 获取角色信息请求
message GetRoleInfoRequest {
}

// 获取角色信息响应
message GetRoleInfoResponse {
  bool success = 1;         // 是否成功
  Role role = 2;            // 角色信息
  string message = 3;       // 消息
}


