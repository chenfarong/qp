syntax = "proto3";

package protocli;

import "base.proto";

option go_package = "zgame/pb/golang/gamelogic";



//角色基础数据
message ActorData {
    string actor_id=1; //角色编号
    
    string pid=2; //账号
    int64 created_at=3; //创建时间
    int64 updated_at=4; //更新时间
    int64 online_at=5; //本次上线时间
    int64 offline_at=6; //上次下线时间

    string name=7; //角色名称
    int32 level=8;//等级
    string realm=9; //服 区 名称

}


message ActorCreateRequest
{
    string session=1; //会话ID
    optional string name=2; //角色名称 如果没提供的时候服务器随机一个名字
}


message ActorUseRequest
{
    string session=1; //会话ID
    string aid=2;   //角色编号
}


message ActorUseWithNameRequest
{
    string gm_pass=1; //游戏管理员通信证
    string name=2;  //角色名称
    string realm=3; //游戏服编号
}

//创建 使用 角色返回
message ActorUseResponse
{
    ResultErr err=1;
    ActorData data=2;
}


